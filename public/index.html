<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buddy - DS Mentor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23; color: #e0e0e0; height: 100vh; display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #1a1a3e, #2d1b4e);
      padding: 16px 24px; display: flex; align-items: center;
      border-bottom: 1px solid #333366; gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { color: #8888cc; font-size: 13px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .msg.assistant { align-self: flex-start; background: #1e1e3f; border: 1px solid #333366; border-bottom-left-radius: 4px; }
    .msg.assistant code { background: #2d2d5e; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .msg.assistant pre {
      background: #0a0a1a; padding: 12px; border-radius: 8px; overflow-x: auto;
      margin: 8px 0; border: 1px solid #333366;
    }
    .msg.assistant pre code { background: transparent; padding: 0; }
    .typing { align-self: flex-start; background: #1e1e3f; border: 1px solid #333366; border-radius: 12px; padding: 12px 20px; display: flex; gap: 4px; }
    .typing span { width: 6px; height: 6px; background: #8888cc; border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
    #input-area { padding: 16px 20px; border-top: 1px solid #333366; background: #1a1a3e; display: flex; gap: 12px; }
    #input { flex: 1; background: #0f0f23; border: 1px solid #333366; border-radius: 24px; padding: 12px 20px; color: #e0e0e0; font-size: 14px; outline: none; }
    #input:focus { border-color: #2563eb; }
    #send { background: #2563eb; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #send:hover { background: #1d4ed8; }
    #send:disabled { background: #333366; cursor: not-allowed; }
    .welcome { text-align: center; color: #8888cc; margin-top: 40px; }
    .welcome h2 { font-size: 24px; color: #ccccee; margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.6; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .suggestions button { background: #1e1e3f; border: 1px solid #333366; color: #8888cc; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .suggestions button:hover { border-color: #2563eb; color: #ccccee; }
    .error-msg { color: #f87171; text-align: center; font-size: 13px; padding: 8px; }
  </style>
</head>
<body>
  <header>
    <span class="status-dot"></span>
    <h1>🧠 Buddy</h1>
    <span>your DS mentor</span>
  </header>

  <div id="chat">
    <div class="welcome" id="welcome">
      <h2>Hey Jaiakash! 👋</h2>
      <p>Ask me anything about Python, SQL, Stats, ML, or Data Viz.<br />I can search the web for the latest info too.</p>
      <div class="suggestions">
        <button onclick="sendSuggestion('Explain Python decorators with an example')">Python decorators</button>
        <button onclick="sendSuggestion('What should I learn this week?')">What to learn next?</button>
        <button onclick="sendSuggestion('Difference between r2 and adjusted r2')">R² vs Adj R²</button>
        <button onclick="sendSuggestion('SQL window functions explained simply')">SQL window functions</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <input id="input" type="text" placeholder="Ask me anything..." autofocus />
    <button id="send" onclick="sendMessage()" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const welcome = document.getElementById('welcome');
    let sessionId = localStorage.getItem('buddy_session') || crypto.randomUUID().slice(0,8);
    localStorage.setItem('buddy_session', sessionId);
    let loading = false;

    input.addEventListener('input', () => {
      sendBtn.disabled = !input.value.trim() || loading;
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    function sendSuggestion(text) {
      input.value = text;
      sendMessage();
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg || loading) return;
      input.value = '';
      sendBtn.disabled = true;
      welcome?.remove();

      addMessage('user', msg);
      showTyping();
      loading = true;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, session_id: sessionId }),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        removeTyping();
        addMessage('assistant', data.response);
      } catch (err) {
        removeTyping();
        const errDiv = document.createElement('div');
        errDiv.className = 'error-msg';
        errDiv.textContent = `⚠️ ${err.message}`;
        chat.appendChild(errDiv);
      }
      loading = false;
      sendBtn.disabled = !input.value.trim();
    }
  </script>
</body>
</html>
